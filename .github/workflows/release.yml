name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact: crontinel.exe
            path: target/x86_64-pc-windows-msvc/release/crontinel.exe
          - target: x86_64-apple-darwin
            artifact: crontinel-x86_64-apple-darwin
            path: target/x86_64-apple-darwin/release/crontinel
          - target: aarch64-apple-darwin
            artifact: crontinel-aarch64-apple-darwin
            path: target/aarch64-apple-darwin/release/crontinel
          - target: x86_64-unknown-linux-musl
            artifact: crontinel-x86_64-unknown-linux-musl
            path: target/x86_64-unknown-linux-musl/release/crontinel
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.path }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
